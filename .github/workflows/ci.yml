name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_sqlite
          coverage: none

      - run: composer install --prefer-dist --no-progress --no-interaction

      - run: composer lint

      - run: composer analyse

      - name: Prepare app environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - run: composer test

      # discovered() is filesystem-only, so the staleness gate needs no database.
      - name: Frontend registry staleness gate
        run: php artisan zenon:frontend:generate --check

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run build
